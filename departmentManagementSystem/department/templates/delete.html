<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMS | Delete Department</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --accent: #2dd4bf;
            --bg-dark: #0f111a; 
            --card-bg: rgba(23, 25, 35, 0.9);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --danger-glow: rgba(239, 68, 68, 0.15);
        }

        :root.light-theme {
            --primary: #4f46e5;
            --bg-dark: #f1f5f9; 
            --card-bg: rgba(255, 255, 255, 0.95);
            --glass-border: rgba(0, 0, 0, 0.1);
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.3s ease; }

        body {
            background: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(239, 68, 68, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(99, 102, 241, 0.05) 0%, transparent 40%);
        }

        .confirm-card {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            border: 1px solid var(--glass-border);
            padding: 40px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        /* Danger Top Accent Bar */
        .confirm-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 5px;
            background: linear-gradient(90deg, var(--danger), var(--secondary));
        }

        .warning-icon {
            font-size: 3.5rem;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 15px var(--danger-glow));
        }

        h1 {
            font-size: 1.7rem;
            font-weight: 800;
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--danger), #fca5a5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .info-box {
            background: var(--danger-glow);
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 30px;
            text-align: left;
        }

        .info-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            color: var(--danger);
            font-weight: 800;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .info-value {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .delete-btn {
            background: var(--danger);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 10px 20px var(--danger-glow);
        }

        .delete-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
            box-shadow: 0 15px 25px var(--danger-glow);
        }

        .cancel-btn {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--glass-border);
            padding: 14px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
        }

        .cancel-btn:hover {
            background: var(--glass-border);
            color: var(--text-main);
        }

        .theme-toggle {
            position: fixed;
            top: 30px;
            right: 30px;
            cursor: pointer;
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 10px 20px;
            border-radius: 14px;
            font-size: 0.8rem;
            font-weight: 600;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>

    <button class="theme-toggle" id="themeToggle">🌓 Theme</button>

    <div class="confirm-card">
        <div class="warning-icon">⚠️</div>
        <h1>Destructive Action</h1>
        <p>You are about to permanently remove this department from the central registry. This process cannot be reversed.</p>

        <div class="info-box">
            <div class="info-label">Target Entity</div>
            <div class="info-value">
                {{ department.department_name }} 
                <span style="opacity: 0.5; font-weight: 400; font-size: 0.9rem;">#{{ department.department_code }}</span>
            </div>
        </div>

        <form method="POST" action="{% url 'delete' department.id %}">
            {% csrf_token %}
            <div class="btn-group">
                <button type="submit" class="delete-btn">Confirm Permanent Deletion</button>
                <a href="{% url 'dashboard' %}" class="cancel-btn">Abort & Return to Safety</a>
            </div>
        </form>
    </div>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        const root = document.documentElement;

        if (localStorage.getItem('theme') === 'light') {
            root.classList.add('light-theme');
        }

        themeToggle.addEventListener('click', () => {
            root.classList.toggle('light-theme');
            localStorage.setItem('theme', root.classList.contains('light-theme') ? 'light' : 'dark');
        });
    </script>
</body>
</html>
